version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: job_assistant_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
      POSTGRES_DB: job_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_assistant_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/job_assistant
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=your_password_here
      - NLP_SERVICE_URL=http://ai-engine:8000
    depends_on:
      db:
        condition: service_healthy

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: job_assistant_ai
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_assistant_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
